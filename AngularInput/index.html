<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flex-flow</title>
<link rel="stylesheet" href="style.css">
</head>
<body> 
<div class="container">
        <div>
            <h2>Input Padrão (Underline)</h2>
            <div class="input-field">
                <input type="text" id="name" placeholder=" " />
                <label for="name">Nome completo</label>
            </div>
            <div class="helper-text">Digite seu nome</div>
        </div>

        <div>
            <h2>Input Outlined</h2>
            <div class="input-field outlined">
                <input type="email" id="email" placeholder=" " />
                <label for="email">E-mail</label>
            </div>
            <div class="helper-text">exemplo@email.com</div>
        </div>

        <div>
            <h2>Input Filled</h2>
            <div class="input-field filled">
                <input type="tel" id="phone" placeholder=" " />
                <label for="phone">Telefone</label>
            </div>
            <div class="helper-text">(00) 00000-0000</div>
        </div>

        <div>
            <h2>VIVO</h2>
            <div class="input-field2 filled">
                <input type="tel" id="phone" placeholder=" " />
                <label for="phone">Telefone</label>
            </div>
        </div>
        
        <div>
            <h2>Input com Erro</h2>
            <div class="input-field error">
                <input type="password" id="password" placeholder=" " value="123" />
                <label for="password">Senha</label>
            </div>
            <div class="helper-text">A senha deve ter no mínimo 8 caracteres</div>
        </div>

        <div>
            <h2>Input Desabilitado</h2>
            <div class="input-field">
                <input type="text" id="disabled12" placeholder=" " value="Campo desabilitado" disabled />
                <label for="disabled12">Campo desabilitado</label>
            </div>
            <div class="helper-text">Este campo não pode ser editado</div>
        </div>

        <div class=""></div>
    </div>
</body>
</html>
